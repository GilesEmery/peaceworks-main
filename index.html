<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>PeaceWorks Consulting</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

<style>

:root{
--black:#0f0f0f;
--off-black:#1a1a1a;
--charcoal:#2e2e2e;
--mid-gray:#6b6b6b;
--light-gray:#c8c8c8;
--off-white:#f5f3f0;
--white:#ffffff;
--sage:#8fab8e;
--sage-light:#b8ccb7;
--sage-pale:#e8f0e7;
--sage-dark:#5a7a5c;
}

,::before,::after{
box-sizing:border-box;
margin:0;
padding:0;
}

html{
scroll-behavior:smooth;
}

body{
font-family:'DM Sans',sans-serif;
background:var(--off-white);
color:var(--black);
overflow-x:hidden;
}

/ HERO /

.hero{
min-height:90vh;
display:grid;
grid-template-columns:1fr 1fr;
align-items:center;
padding:5rem 5% 5rem;
position:relative;
overflow:hidden;
}

.hero::before{
content:'';
position:absolute;
top:-10%;
right:-5%;
width:55%;
height:110%;
background:linear-gradient(135deg,var(--sage-pale) 0%,rgba(184,204,183,0.4) 60%,transparent 100%);
border-radius:0 0 0 60%;
z-index:0;
}

.hero-text{
position:relative;
z-index:1;
padding-right:2rem;
}

.hero-eyebrow{
font-size:.72rem;
letter-spacing:.22em;
text-transform:uppercase;
color:var(--sage-dark);
margin-bottom:1.5rem;
display:flex;
align-items:center;
gap:.8rem;
}

.hero-eyebrow::before{
content:'';
display:block;
width:30px;
height:1px;
background:var(--sage-dark);
flex-shrink:0;
}

.hero h1{
font-family:'Cormorant Garamond',serif;
font-size:clamp(2.4rem,5vw,5rem);
font-weight:300;
line-height:1.08;
color:var(--black);
margin-bottom:1.5rem;
}

.hero h1 em{
font-style:italic;
color:var(--sage-dark);
}

.hero-sub{
font-size:1.05rem;
line-height:1.7;
color:var(--charcoal);
max-width:540px;
margin-bottom:2rem;
}

.hero-actions{
display:flex;
gap:1rem;
flex-wrap:wrap;
}

.btn-primary{
background:var(--sage-dark);
color:white;
padding:.9rem 1.6rem;
text-decoration:none;
border-radius:4px;
font-size:.9rem;
}

.btn-outline{
border:1px solid var(--sage-dark);
padding:.9rem 1.6rem;
text-decoration:none;
border-radius:4px;
color:var(--sage-dark);
font-size:.9rem;
}

/ HERO VISUAL /

.hero-visual{
display:flex;
justify-content:center;
align-items:center;
position:relative;
z-index:1;
}

/ ORBIT EMBLEM /

.hero-emblem{
position:relative;
width:420px;
height:420px;
}

/ orbit rings /

.emblem-ring{
position:absolute;
top:50%;
left:50%;
border-radius:50%;
border:1px solid rgba(90,122,92,.2);
transform:translate(-50%,-50%);
animation-timing-function:ease-in-out;
}

.ring-1{
width:200px;
height:200px;
animation:orbitSpin 24s infinite;
}

.ring-2{
width:300px;
height:300px;
animation:orbitSpinReverse 36s infinite;
}

.ring-3{
width:400px;
height:400px;
animation:orbitSpin 60s infinite;
}

/ orbit nodes /

.orbit-node{
position:absolute;
width:8px;
height:8px;
background:var(--sage-dark);
border-radius:50%;
top:-4px;
left:50%;
}

.node-b{
top:50%;
left:100%;
}

.node-c{
bottom:-4px;
left:50%;
}

/ center logo /

.emblem-center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:5;
}

.emblem-center img{
width:140px;
}

/ organic orbit motion /

@keyframes orbitSpin{
0%{transform:translate(-50%,-50%) rotate(0deg) scale(1)}
50%{transform:translate(-50%,-50%) rotate(180deg) scale(1.03)}
100%{transform:translate(-50%,-50%) rotate(360deg) scale(1)}
}

@keyframes orbitSpinReverse{
0%{transform:translate(-50%,-50%) rotate(360deg) scale(1)}
50%{transform:translate(-50%,-50%) rotate(180deg) scale(.97)}
100%{transform:translate(-50%,-50%) rotate(0deg) scale(1)}
}

/ fade animation */

.fade-in{
opacity:0;
transform:translateY(20px);
transition:all .8s ease;
}

.fade-in.visible{
opacity:1;
transform:translateY(0);
}

</style>
</head>

<body>

<section class="hero" id="home">

<div class="hero-text fade-in">

<p class="hero-eyebrow">Workplace Consulting</p>

<h1>
Where <em>Peace</em><br>
Becomes Your<br>
Competitive Edge
</h1>

<p class="hero-sub">
We help business owners become the peacemakers their organizations need —
transforming conflict into collaboration, tension into trust,
and discord into lasting culture.
</p>

<div class="hero-actions">

<a href="https://yourwayfinders.org" target="_blank" class="btn-primary">
Begin the Conversation
</a>

<a href="#services" class="btn-outline">
Our Services
</a>

</div>

</div>

<div class="hero-visual fade-in">

<div class="hero-emblem">

<div class="emblem-ring ring-1">
<span class="orbit-node"></span>
<span class="orbit-node node-b"></span>
</div>

<div class="emblem-ring ring-2">
<span class="orbit-node"></span>
<span class="orbit-node node-b"></span>
<span class="orbit-node node-c"></span>
</div>

<div class="emblem-ring ring-3">
<span class="orbit-node"></span>
<span class="orbit-node node-b"></span>
</div>

<div class="emblem-center">
<img src="assets/images/peaceworks-logo.png" alt="PeaceWorks Logo">
</div>

</div>

</div>

</section>

<script>

const observer = new IntersectionObserver((entries)=>{
entries.forEach(e=>{
if(e.isIntersecting){
e.target.classList.add("visible");
}
});
},{threshold:.1});

document.querySelectorAll(".fade-in").forEach(el=>{
observer.observe(el);
});

</script>

</body>
</html>
